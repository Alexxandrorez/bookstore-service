<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{dashboard.orders.view} + ' — ' + #{nav.brand}">Деталі замовлення — BookStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="flex-center"> <div class="lang-switcher-fixed">
    <a th:href="@{''(lang='uk')}" th:class="${#locale.language == 'uk' ? 'active' : ''}">UA</a>
    <span class="divider-small">|</span>
    <a th:href="@{''(lang='en')}" th:class="${#locale.language == 'en' ? 'active' : ''}">EN</a>
</div>

<div class="container container-narrow">
    <a th:href="@{/employee/dashboard}" class="btn-secondary" style="margin-bottom: 2rem; display: inline-block;" th:text="#{paging.back}">
        ← Назад до списку
    </a>

    <h2 class="page-title" style="text-align: left;" th:text="#{order.details.title} + ' #' + ${order.id}">Деталі замовлення</h2>

    <div class="card details-container">
        <div class="detail-item">
            <span class="detail-label" th:text="#{order.field.client}">Клієнт</span>
            <span class="detail-value" th:text="${order.clientEmail}">email@test.com</span>
        </div>

        <div class="detail-item">
            <span class="detail-label" th:text="#{order.field.date}">Дата</span>
            <span class="detail-value" th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">01.01.2026</span>
        </div>

        <hr class="divider">

        <h4 class="meta" style="margin-bottom: 1.5rem;" th:text="#{order.items.heading}">Товари:</h4>
        <ul class="order-items-list" style="list-style: none; padding: 0;">
            <li th:each="item : ${order.bookItems}" class="book-item" style="padding: 0.8rem 0; border-bottom: 1px solid #f0ede8; display: flex; justify-content: space-between;">
                <span th:text="${item.bookName}">Назва книги</span>
                <strong th:text="${item.quantity} + ' ' + #{order.items.qty}">1 шт.</strong>
            </li>
        </ul>

        <hr class="divider">

        <div class="order-sum" style="text-align: right; margin-top: 1.5rem;">
            <span class="order-sum-label" th:text="#{order.total.label}">Разом до сплати</span>
            <span class="order-sum-value" th:text="${order.price} + ' ' + #{book.price.currency}">0.00 грн</span>
        </div>
    </div>
</div>

</body>
</html>
