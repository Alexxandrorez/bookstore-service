<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.title} + ' — ' + #{nav.brand}">Адмін-панель — BookStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a class="brand" href="/">
        <span th:text="#{nav.brand}">BOOKSTORE</span>
        <small th:text="#{nav.admin}">ADMIN</small>
    </a>

    <div class="nav-right">
        <div class="lang-switcher">
            <a th:href="@{''(lang='uk')}" th:class="${#locale.language == 'uk' ? 'active' : ''}">UA</a>
            <span class="divider-small">|</span>
            <a th:href="@{''(lang='en')}" th:class="${#locale.language == 'en' ? 'active' : ''}">EN</a>
        </div>
        <a href="/" class="btn-nav" th:text="#{nav.back.home}">На головну</a>
    </div>
</nav>

<div class="container">
    <div class="header-flex" style="flex-direction: column; align-items: flex-start;">
        <h1 class="page-title" style="text-align: left;" th:text="#{admin.title}">Панель керування</h1>
        <p class="meta" th:text="#{admin.lead}">Менеджмент персоналу та бази клієнтів</p>
    </div>

    <div class="grid">
        <div class="card profile-card no-border" style="display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <h2 class="section-heading" style="border: none; padding: 0;" th:text="#{admin.employees.card.title}">Працівники</h2>
                <p class="info-text" style="margin-bottom: 2rem;" th:text="#{admin.employees.card.text}">Керування командою: додавання, зміна ролей та видалення.</p>
            </div>

            <div class="order-sum" style="border-top: 1px solid #e8e4de; padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; text-align: left;">
                <div>
                    <span class="order-sum-label" th:text="#{admin.employees.count.label}">В штаті</span>
                    <span class="order-sum-value" th:text="${employeeCount}">0</span>
                </div>
                <a th:href="@{/admin/employees}" class="btn-primary" th:text="#{admin.employees.manage}">Керувати</a>
            </div>
        </div>

        <div class="card profile-card no-border" style="display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <h2 class="section-heading" style="border: none; padding: 0;" th:text="#{admin.clients.card.title}">Клієнти</h2>
                <p class="info-text" style="margin-bottom: 2rem;" th:text="#{admin.clients.card.text}">Перегляд бази покупців та їх фінансової активності.</p>
            </div>

            <div class="order-sum" style="border-top: 1px solid #e8e4de; padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; text-align: left;">
                <div>
                    <span class="order-sum-label" th:text="#{admin.clients.count.label}">Покупців</span>
                    <span class="order-sum-value" th:text="${clientCount}">0</span>
                </div>
                <a th:href="@{/admin/clients/all}" class="btn-primary" th:text="#{admin.clients.view}">Переглянути</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
